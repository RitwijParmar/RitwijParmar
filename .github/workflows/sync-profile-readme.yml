name: Sync Profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "35 13 * * *" # Daily at 13:35 UTC
  push:
    branches: [ main ]
    paths:
      - "scripts/sync_profile_readme.py"
      - "README.md"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Sync dynamic section
        run: python scripts/sync_profile_readme.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .generated/pinned_projects.json .generated/pinned_projects.md
          git commit -m "chore(profile): sync pinned projects and media"
          git push

